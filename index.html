<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laforêt — Staff Meal</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@200;300;400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
    <div class="deco-line deco-line-1"></div>
    <div class="deco-line deco-line-2"></div>

    <div class="card-wrap">
      <div class="card">
        <div class="brand-mark"></div>

        <div class="heading-wrap">
          <h1 class="title">Laforêt Staff Meal</h1>
          <p class="subtitle">Enter your name to continue</p>
        </div>

        <div class="divider">
          <div class="divider-line"></div>
          <div class="divider-dot"></div>
          <div class="divider-line"></div>
        </div>

        <div class="input-group">
          <svg
            class="input-icon"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="8" r="4" />
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
          </svg>
          <input
            type="text"
            class="input-field"
            id="nameInput"
            placeholder="Your name"
            autocomplete="off"
          />
          <div class="suggestions" id="suggestions"></div>
        </div>

        <div class="validation-msg" id="validationMsg">
          Please enter your name before continuing
        </div>

        <div class="btn-wrap">
          <button
            class="btn-primary"
            id="continueBtn"
            onclick="handleContinue()"
          >
            <span id="btnText">Continue</span>
          </button>
        </div>

        <div class="card-footer">
          <p class="footer-text">
            Laforêt <span class="footer-gold">·</span> Staff Access Only
          </p>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
    <script>
      initLogin().catch(console.error);
    </script>
  </body>
</html>
