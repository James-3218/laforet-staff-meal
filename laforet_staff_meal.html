<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laforêt — Staff Meal</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@200;300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --forest-deep: #1a2e22;
        --forest-mid: #213829;
        --forest-light: #2d4a38;
        --forest-accent: #3a5c45;
        --gold: #c8a96e;
        --gold-light: #dfc48e;
        --white: #f5f2ec;
        --white-soft: rgba(245, 242, 236, 0.7);
        --white-dim: rgba(245, 242, 236, 0.35);
        --glass-bg: rgba(255, 255, 255, 0.04);
        --glass-border: rgba(255, 255, 255, 0.1);
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(
          ellipse at 30% 20%,
          #253d2e 0%,
          #1a2e22 40%,
          #111e17 100%
        );
        font-family: "Jost", sans-serif;
        overflow: hidden;
        position: relative;
      }

      .bg-orb {
        position: fixed;
        border-radius: 50%;
        filter: blur(80px);
        pointer-events: none;
        opacity: 0.25;
        animation: breathe 8s ease-in-out infinite;
      }
      .bg-orb-1 {
        width: 500px;
        height: 500px;
        background: radial-gradient(circle, #3a5c45, transparent);
        top: -100px;
        left: -100px;
        animation-delay: 0s;
      }
      .bg-orb-2 {
        width: 400px;
        height: 400px;
        background: radial-gradient(circle, #c8a96e22, transparent);
        bottom: -80px;
        right: -80px;
        animation-delay: 4s;
      }
      .bg-orb-3 {
        width: 300px;
        height: 300px;
        background: radial-gradient(circle, #2d4a38, transparent);
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        animation-delay: 2s;
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        opacity: 0.4;
        pointer-events: none;
        z-index: 0;
      }

      .deco-line {
        position: fixed;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(200, 169, 110, 0.15),
          transparent
        );
        pointer-events: none;
      }
      .deco-line-1 {
        width: 100%;
        height: 1px;
        top: 25%;
        left: 0;
        transform: rotate(-8deg) scaleX(1.5);
      }
      .deco-line-2 {
        width: 100%;
        height: 1px;
        bottom: 30%;
        left: 0;
        transform: rotate(5deg) scaleX(1.5);
      }

      @keyframes breathe {
        0%,
        100% {
          opacity: 0.2;
          transform: scale(1);
        }
        50% {
          opacity: 0.35;
          transform: scale(1.05);
        }
      }

      .card-wrap {
        position: relative;
        z-index: 10;
        width: 100%;
        max-width: 400px;
        padding: 0 20px;
        animation: riseIn 1s cubic-bezier(0.16, 1, 0.3, 1) both;
        overflow: visible;
      }

      @keyframes riseIn {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .card {
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.07) 0%,
          rgba(255, 255, 255, 0.02) 100%
        );
        border: 1px solid var(--glass-border);
        border-radius: 24px;
        padding: 52px 44px 48px;
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.05) inset,
          0 40px 80px rgba(0, 0, 0, 0.5),
          0 0 120px rgba(58, 92, 69, 0.12);
        position: relative;
        overflow: visible;
      }

      .card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(200, 169, 110, 0.4),
          transparent
        );
      }

      .brand-mark {
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 36px;
        animation: riseIn 1s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
      }

      .brand-icon {
        width: 52px;
        height: 52px;
        border: 1px solid rgba(200, 169, 110, 0.3);
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(200, 169, 110, 0.06);
      }

      .brand-icon svg {
        width: 22px;
        height: 22px;
        opacity: 0.85;
      }

      .heading-wrap {
        text-align: center;
        margin-bottom: 40px;
        animation: riseIn 1s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
      }

      .title {
        font-family: "Playfair Display", serif;
        font-size: 28px;
        font-weight: 500;
        color: var(--white);
        letter-spacing: 0.01em;
        line-height: 1.2;
        margin-bottom: 10px;
      }

      .title em {
        font-style: italic;
        color: var(--gold-light);
      }

      .subtitle {
        font-family: "Jost", sans-serif;
        font-size: 13px;
        font-weight: 200;
        color: var(--white-dim);
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 28px;
        animation: riseIn 1s cubic-bezier(0.16, 1, 0.3, 1) 0.25s both;
      }
      .divider-line {
        flex: 1;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          rgba(200, 169, 110, 0.25)
        );
      }
      .divider-line:last-child {
        background: linear-gradient(
          270deg,
          transparent,
          rgba(200, 169, 110, 0.25)
        );
      }
      .divider-dot {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: rgba(200, 169, 110, 0.4);
      }

      .input-group {
        position: relative;
        margin-bottom: 12px;
        animation: riseIn 1s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
      }

      .input-icon {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--white-dim);
        pointer-events: none;
        transition: color 0.3s;
      }

      .input-field {
        width: 100%;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 16px 16px 16px 48px;
        color: var(--white);
        font-family: "Jost", sans-serif;
        font-size: 14px;
        font-weight: 300;
        letter-spacing: 0.03em;
        outline: none;
        transition: all 0.3s ease;
        -webkit-appearance: none;
      }

      .input-field::placeholder {
        color: var(--white-dim);
      }

      .input-field:focus {
        border-color: rgba(200, 169, 110, 0.4);
        background: rgba(255, 255, 255, 0.06);
        box-shadow:
          0 0 0 3px rgba(200, 169, 110, 0.08),
          0 0 20px rgba(200, 169, 110, 0.05);
      }

      .suggestions {
        position: absolute;
        top: calc(100% + 6px);
        left: 0;
        right: 0;
        background: #1e3328;
        border: 1px solid rgba(200, 169, 110, 0.2);
        border-radius: 12px;
        overflow: hidden;
        z-index: 9999;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        display: none;
        backdrop-filter: blur(20px);
        max-height: 220px;
        overflow-y: auto;
      }

      .suggestions.open {
        display: block;
      }

      .suggestion-item {
        padding: 12px 18px;
        cursor: pointer;
        font-family: "Jost", sans-serif;
        font-size: 13.5px;
        font-weight: 300;
        color: var(--white-soft);
        letter-spacing: 0.03em;
        transition: all 0.15s;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .suggestion-item:last-child {
        border-bottom: none;
      }

      .suggestion-item:hover,
      .suggestion-item.highlighted {
        background: rgba(200, 169, 110, 0.1);
        color: var(--white);
        padding-left: 22px;
      }

      .suggestion-avatar {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: linear-gradient(135deg, #3a5c45, #2d4a38);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 10px;
        color: var(--gold-light);
        font-weight: 400;
        flex-shrink: 0;
      }

      .validation-msg {
        font-size: 11.5px;
        color: rgba(200, 100, 100, 0.8);
        font-family: "Jost", sans-serif;
        font-weight: 300;
        letter-spacing: 0.04em;
        margin-top: 6px;
        margin-left: 4px;
        height: 16px;
        transition: opacity 0.3s;
        opacity: 0;
      }

      .validation-msg.visible {
        opacity: 1;
      }

      .btn-wrap {
        margin-top: 24px;
        animation: riseIn 1s cubic-bezier(0.16, 1, 0.3, 1) 0.4s both;
      }

      .btn-primary {
        width: 100%;
        padding: 17px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(135deg, #c8a96e 0%, #b8954f 100%);
        color: #1a2e22;
        font-family: "Jost", sans-serif;
        font-size: 13px;
        font-weight: 400;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        transition: all 0.3s ease;
        box-shadow: 0 8px 24px rgba(200, 169, 110, 0.25);
      }

      .btn-primary::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, #dfc48e 0%, #c8a96e 100%);
        opacity: 0;
        transition: opacity 0.3s;
      }

      .btn-primary:hover::before {
        opacity: 1;
      }
      .btn-primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 12px 32px rgba(200, 169, 110, 0.35);
      }
      .btn-primary:active {
        transform: translateY(0);
        box-shadow: 0 4px 16px rgba(200, 169, 110, 0.2);
      }
      .btn-primary span {
        position: relative;
        z-index: 1;
      }

      .btn-primary.success {
        background: linear-gradient(135deg, #3a5c45, #2d4a38);
        box-shadow: 0 8px 24px rgba(58, 92, 69, 0.4);
        color: var(--gold-light);
      }
      .btn-primary.success::before {
        opacity: 0;
      }

      .card-footer {
        text-align: center;
        margin-top: 32px;
        padding-top: 24px;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        animation: riseIn 1s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both;
      }

      .footer-text {
        font-family: "Cormorant Garamond", serif;
        font-size: 12px;
        font-weight: 300;
        color: var(--white-dim);
        letter-spacing: 0.05em;
        font-style: italic;
      }

      .footer-gold {
        color: rgba(200, 169, 110, 0.5);
        margin: 0 6px;
      }
    </style>
  </head>
  <body>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
    <div class="deco-line deco-line-1"></div>
    <div class="deco-line deco-line-2"></div>

    <div class="card-wrap">
      <div class="card">
        <div class="brand-mark"></div>

        <div class="heading-wrap">
          <h1 class="title">Laforêt Staff Meal</h1>
          <p class="subtitle">Enter your name to continue</p>
        </div>

        <div class="divider">
          <div class="divider-line"></div>
          <div class="divider-dot"></div>
          <div class="divider-line"></div>
        </div>

        <div class="input-group">
          <svg
            class="input-icon"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="8" r="4" />
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
          </svg>
          <input
            type="text"
            class="input-field"
            id="nameInput"
            placeholder="Your name"
            autocomplete="off"
          />
          <div class="suggestions" id="suggestions"></div>
        </div>

        <div class="validation-msg" id="validationMsg">
          Please enter your name before continuing
        </div>

        <div class="btn-wrap">
          <button
            class="btn-primary"
            id="continueBtn"
            onclick="handleContinue()"
          >
            <span id="btnText">Continue</span>
          </button>
        </div>

        <div class="card-footer">
          <p class="footer-text">
            Laforêt <span class="footer-gold">·</span> Staff Access Only
          </p>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
    <script>
      initLogin();
    </script>
  </body>
</html>
