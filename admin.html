<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laforêt — Admin Meal List</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@200;300;400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="admin_style.css" />
  </head>
  <body class="staff-page admin-page">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
    <div class="deco-line deco-line-1"></div>
    <div class="deco-line deco-line-2"></div>

    <!-- Top bar -->
    <header class="top-bar">
      <button class="back-btn" onclick="window.location.href = 'index.html'">
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M19 12H5M12 5l-7 7 7 7" />
        </svg>
        <span>Back</span>
      </button>
      <div class="brand-wordmark">LA FORÊT</div>
      <div class="top-bar-spacer"></div>
    </header>

    <!-- Main content -->
    <main class="main-wrap admin-main-wrap">
      <!-- Page heading -->
      <div class="admin-heading">
        <div class="admin-title-wrap">
          <h1 class="admin-title">Admin <em>Meal List</em></h1>
          <p class="admin-subtitle">Weekend staff meal overview</p>
        </div>
        <div class="admin-dates-badge" id="adminDatesBadge">—</div>
      </div>

      <!-- Action bar -->
      <div class="admin-action-bar">
        <div style="display:flex;gap:10px;flex-wrap:wrap;">
          <button class="admin-btn admin-btn-gold" onclick="openStaffListModal()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            Staff List
          </button>
        </div>
        <div class="admin-print-btns">
          <button class="admin-btn admin-btn-ghost" onclick="testWeeklyReset()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
            Test Reset
          </button>
          <button class="admin-btn admin-btn-ghost" onclick="printMealList('sat')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 6 2 18 2 18 9"/>
              <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
              <rect x="6" y="14" width="12" height="8"/>
            </svg>
            Print Saturday
          </button>
          <button class="admin-btn admin-btn-ghost" onclick="printMealList('sun')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 6 2 18 2 18 9"/>
              <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
              <rect x="6" y="14" width="12" height="8"/>
            </svg>
            Print Sunday
          </button>
        </div>
      </div>

      <!-- Two-column day cards -->
      <div class="admin-grid">
        <!-- Saturday card -->
        <div class="admin-day-card" id="satCard">
          <div class="card-shimmer"></div>
          <div class="admin-day-header">
            <div>
              <div class="admin-day-name">Saturday</div>
              <div class="admin-day-date" id="adminSatDate">—</div>
            </div>
            <div class="admin-count-badge" id="satCountBadge">0 attending</div>
          </div>
          <div class="admin-divider">
            <div class="divider-line"></div>
            <div class="divider-dot"></div>
            <div class="divider-line"></div>
          </div>
          <div class="admin-list" id="satList">
            <div class="admin-empty">No responses yet</div>
          </div>
        </div>

        <!-- Sunday card -->
        <div class="admin-day-card" id="sunCard">
          <div class="card-shimmer"></div>
          <div class="admin-day-header">
            <div>
              <div class="admin-day-name">Sunday</div>
              <div class="admin-day-date" id="adminSunDate">—</div>
            </div>
            <div class="admin-count-badge" id="sunCountBadge">0 attending</div>
          </div>
          <div class="admin-divider">
            <div class="divider-line"></div>
            <div class="divider-dot"></div>
            <div class="divider-line"></div>
          </div>
          <div class="admin-list" id="sunList">
            <div class="admin-empty">No responses yet</div>
          </div>
        </div>
      </div>



      <div class="page-footer">
        <p class="footer-text">
          Laforêt <span class="footer-gold">·</span> Admin Access
        </p>
      </div>
    </main>

    <!-- Staff List Modal -->
    <div class="modal-overlay" id="staffListOverlay" onclick="closeStaffListModal(event)">
      <div class="modal-card staff-list-modal-card">
        <div class="card-shimmer"></div>

        <!-- Header -->
        <div class="modal-header">
          <div class="modal-title-wrap">
            <h2 class="modal-title">Staff <em>List</em></h2>
            <p class="modal-subtitle">Manage staff members</p>
          </div>
          <button class="modal-close" onclick="closeStaffListModal()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>

        <div class="admin-divider" style="margin: 18px 0 20px;">
          <div class="divider-line"></div><div class="divider-dot"></div><div class="divider-line"></div>
        </div>

        <!-- Add Staff form -->
        <div class="sl-add-section">
          <div class="sl-add-title">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Add New Staff
          </div>
          <div class="sl-add-fields">
            <div class="modal-input-wrap" style="flex:1; min-width: 140px;">
              <input type="text" id="slNameInput" class="modal-input" placeholder="Full name" autocomplete="off" />
              <div class="modal-suggestions" id="slSuggestions"></div>
            </div>
            <select id="slDeptInput" class="modal-input modal-select" style="flex:1; min-width: 130px;">
              <option value="" disabled selected>Department</option>
              <option value="Bakery">Bakery</option>
              <option value="Dish">Dish</option>
              <option value="FOH">FOH</option>
              <option value="Kitchen">Kitchen</option>
              <option value="Store Support">Store Support</option>
            </select>
            <button class="admin-btn admin-btn-gold sl-add-btn" onclick="slAddStaff()">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
              Add
            </button>
          </div>
          <div class="sl-msg" id="slMsg"></div>
        </div>

        <div class="admin-divider" style="margin: 18px 0;">
          <div class="divider-line"></div><div class="divider-dot"></div><div class="divider-line"></div>
        </div>

        <!-- Search -->
        <div class="sl-search-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" class="sl-search-icon">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="slSearchInput" class="modal-input sl-search-input" placeholder="Search by name or department…" oninput="slFilterList()" />
        </div>

        <!-- Staff count -->
        <div class="sl-count" id="slCount">Loading…</div>

        <!-- Staff list -->
        <div class="sl-list" id="slList">
          <div class="admin-empty">Loading staff…</div>
        </div>

      </div>
    </div>

    <!-- Print-only section (hidden in browser, visible when printing) -->
    <div id="printSection" class="print-only"></div>

    <script src="script.js"></script>
    <script src="admin_script.js"></script>
    <script>
      initAdminPage().catch(console.error);
    </script>
  </body>
</html>
